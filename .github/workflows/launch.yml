name: Run on push to main
on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ${{ matrix.os }}

        strategy:
            matrix:
                os: [macos-latest, windows-latest, ubuntu-latest]
            
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                node-version: 20
            
            - name: Install dependencies
              run: npm run build
            
            - name: Build app
              run: npm run build

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                name: app-${{ matrix.os }}
                path: dist/*