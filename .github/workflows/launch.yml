name: Build and release

on:
  push:
    branches:
      - main
      - master
  release:
    types: [created]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_cmd: build:mac
            artifact_path: dist/*.dmg
          - os: windows-latest
            build_cmd: build:win
            artifact_path: dist/*.exe
          - os: ubuntu-latest
            build_cmd: build:linux
            artifact_path: dist/*.AppImage

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: warn
